# MirrorMaker 2 — ÇİFT YÖNLÜ (bidirectional), active/passive disiplini ile.
# Her iki akış da AÇIK ama connector'lar (Debezium+sink) aynı anda yalnız bir tarafta
# çalışır. Böylece failover (gebze->ankara) ve failback (ankara->gebze) için offset/topic
# her zaman karşı tarafa hazır mirror'lanmış olur. DefaultReplicationPolicy önek (gebze./
# ankara.) eklediği için çift yön loop'a girmez.
# Bu dosya connect-mirror-maker.sh tarafından okunur (dedicated MM2 driver).

clusters = gebze, ankara

gebze.bootstrap.servers = kafka-gebze:19092
ankara.bootstrap.servers = kafka-ankara:19092

# --- Her iki yön de aktif ---
gebze->ankara.enabled = true
ankara->gebze.enabled = true

# Hangi topic'ler mirror edilecek (internal/MM2 topic'leri otomatik hariç tutulur)
gebze->ankara.topics = .*
ankara->gebze.topics = .*
gebze->ankara.topics.exclude = .*[\\-\\.]internal, .*\\.replica, __.*, mm2.*, .*\\.checkpoints\\.internal, .*\\.heartbeats
ankara->gebze.topics.exclude = .*[\\-\\.]internal, .*\\.replica, __.*, mm2.*, .*\\.checkpoints\\.internal, .*\\.heartbeats

# --- DR'ın kalbi: offset/checkpoint/heartbeat (iki yön de) ---
gebze->ankara.emit.checkpoints.enabled = true
gebze->ankara.sync.group.offsets.enabled = true
gebze->ankara.emit.heartbeats.enabled = true
ankara->gebze.emit.checkpoints.enabled = true
ankara->gebze.sync.group.offsets.enabled = true
ankara->gebze.emit.heartbeats.enabled = true

# KRİTİK (DR): MM2 varsayılan groups.exclude değeri "console-consumer-.*, connect-.*, __.*"
# yani sink connector'ın consumer group'u (connect-sink-customers) varsayılan olarak
# SYNC EDİLMEZ -> failover'da sink kaldığı yerden devam edemez. connect-.*'ı dışlamadan
# çıkarıyoruz; sadece console-consumer, internal ve Connect worker koordinasyon grubunu
# (dbz-connect-*) hariç tutuyoruz. (İki yön için de.)
gebze->ankara.groups = .*
gebze->ankara.groups.exclude = console-consumer-.*, __.*, dbz-connect-.*
ankara->gebze.groups = .*
ankara->gebze.groups.exclude = console-consumer-.*, __.*, dbz-connect-.*

# Topic config/ACL/partition senkronu (iki yön)
gebze->ankara.sync.topic.configs.enabled = true
ankara->gebze.sync.topic.configs.enabled = true
sync.topic.acls.enabled = false

# Lab tek broker -> her şey RF=1
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1
offset.storage.replication.factor = 1

# Lab'da hızlı görmek için aralıkları kısalt (prod'da artır)
refresh.topics.interval.seconds = 10
refresh.groups.interval.seconds = 10
sync.group.offsets.interval.seconds = 5
emit.checkpoints.interval.seconds = 5
emit.heartbeats.interval.seconds = 5

# Replication policy:
#   DefaultReplicationPolicy (varsayılan) -> hedefte topic adı "gebze.<topic>" olur.
#   Öğrenmek/izlemek için varsayılanı bırakıyoruz; MM2'nin ne yaptığı net görünsün.
#   DR'da sink'in aynı adı tüketmesini istersen IdentityReplicationPolicy'ye geçilir
#   (active/passive tek yönde loop riski yok). Bunu Phase 2'de konuşacağız.
# replication.policy.class = org.apache.kafka.connect.mirror.IdentityReplicationPolicy
