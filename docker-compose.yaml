# MM2 lab — Phase 1: 2 Kafka cluster + MirrorMaker 2 (gebze -> ankara, active/passive)
#
# gebze = primary/active      host: localhost:9092
# ankara = DR/passive         host: localhost:9094
#
# Container ağı içinde brokerlar kafka-gebze:19092 / kafka-ankara:19092 ile konuşur.
# Host'tan CLI için localhost:9092 (gebze) ve localhost:9094 (ankara).

name: cdc-dr-demo-lab

x-kafka-common: &kafka-common
  image: apache/kafka:3.9.1
  # Lab makinesinde bellek baskısıyla (exit 137) kapanmasın diye RAM sınırlanır.
  mem_limit: 1g
  healthcheck:
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1 || exit 1"]
    interval: 5s
    timeout: 10s
    retries: 20
    start_period: 15s

services:
  kafka-gebze:
    <<: *kafka-common
    container_name: kafka-gebze
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: gebze-cluster-aaaaaaaaaa     # her cluster farklı ID -> bağımsız iki cluster
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller   # KRaft: tek node hem broker hem controller (zookeeper yok)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-gebze:9093
      # ÜÇ listener: CONTROLLER (KRaft iç), INTERNAL (container ağı), HOST (laptop'tan CLI).
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,HOST://:9092
      # advertised = client'a "bana şu adresten bağlan" der. INTERNAL container adıyla,
      # HOST localhost ile. ⚠️ Container-İÇİ araçlar INTERNAL'a (19092) bağlanmalı; HOST'un
      # advertised'i (localhost:9092) container içinde erişilemez (lab'da yaşanan tuzak).
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-gebze:19092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL   # broker'lar arası trafik INTERNAL'dan
      # Tek broker olduğu için tüm iç topic'ler RF=1 (çok-node'da artır).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0    # lab: consumer rebalance'ı bekletme

  kafka-ankara:
    # kafka-gebze ile birebir aynı yapı (env açıklamaları için yukarıya bak); farklar:
    # CLUSTER_ID, quorum voter hostu (kafka-ankara) ve HOST advertised portu (9094).
    # 3. ADIM (sync): Ankara Kafka 'make sync-start' ile kalkar.
    <<: *kafka-common
    container_name: kafka-ankara
    profiles: ["sync"]
    ports:
      - "9094:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: ankara-cluster-bbbbbbbbbb
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-ankara:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:19092,HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-ankara:19092,HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  mm2:
    image: apache/kafka:3.9.1
    container_name: mm2-ankara
    mem_limit: 768m
    # 2 ADIMLI DEMO: MM2 varsayılan 'make up' ile başlamaz. Önce gebze'de CDC lokal
    # çalıştırılır, sonra 'make sync-start' (docker compose --profile sync up -d mm2)
    # ile cross-DC replikasyon açılır.
    profiles: ["sync"]
    environment:
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms128m"
    depends_on:
      kafka-gebze:
        condition: service_healthy
      kafka-ankara:
        condition: service_healthy
    volumes:
      - ./mm2.properties:/opt/kafka/config/mm2.properties:ro
    entrypoint: ["/opt/kafka/bin/connect-mirror-maker.sh"]
    command: ["/opt/kafka/config/mm2.properties"]

  # ---------- Phase 2: CDC pipeline (gebze tarafı) ----------
  # pg-source-gebze(tablo) -> Debezium -> kafka-gebze -> JDBC sink -> pg-target-gebze(tablo)

  pg-source-gebze:
    image: postgres:17
    container_name: pg-source-gebze
    mem_limit: 512m
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      # NOT: synchronized_standby_slots BAŞLANGIÇTA AÇIK DEĞİL. Açık olsaydı Debezium logical
      # slot'u (dbz_slot), fiziksel standby (Ankara) aktif olana dek BLOKE olur -> Adım 1'de
      # gebze CDC hiç akmaz. Bu yüzden 3-adımlı akışta 'make standby-up' (Adım 2) standby'ı
      # kaldırdıktan sonra bu ayarı ALTER SYSTEM ile devreye alır.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sourcedb
      POSTGRES_HOST_AUTH_METHOD: trust   # lab: replication auth'u basit tut
    ports:
      - "5432:5432"
    volumes:
      - ./pg-hba-init.sh:/docker-entrypoint-initdb.d/00-pg-hba.sh:ro
      - ./sql/primary-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 20

  pg-target-gebze:
    image: postgres:16
    container_name: pg-target-gebze
    mem_limit: 512m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: targetdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d targetdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  debezium-gebze:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: debezium-gebze
    mem_limit: 1g
    depends_on:
      kafka-gebze:
        condition: service_healthy
      pg-source-gebze:
        condition: service_healthy
      pg-target-gebze:
        condition: service_healthy
    ports:
      - "8084:8083"   # host 8083 başka container'da; lab REST -> localhost:8084
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      BOOTSTRAP_SERVERS: kafka-gebze:19092
      GROUP_ID: dbz-connect-gebze
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------- Phase 3: ankara tarafı stack (failback için) ----------
  # gebze ile simetrik: pg-source-ankara -> debezium-ankara(Debezium) -> kafka-ankara -> debezium-ankara(sink) -> pg-target-ankara
  # Normalde connector'lar burada PAUSED; failover'da resume edilir.

  pg-source-ankara:
    image: postgres:17
    container_name: pg-source-ankara
    mem_limit: 512m
    # 2. ADIM (standby): 'make standby-up' ile kalkar; pg-source-gebze'un streaming
    # standby'ı olur ve failover slot'unu (dbz_slot) senkron alır -> 'make lsn' ile kanıt.
    # 'sync' profilinde de var ki 'make sync-start' tek başına da ayağa kaldırabilsin.
    profiles: ["standby", "sync"]
    depends_on:
      pg-source-gebze:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: pg-source-gebze
    ports:
      - "5434:5432"
    volumes:
      - ./standby-entrypoint.sh:/standby-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/standby-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  pg-target-ankara:
    image: postgres:16
    container_name: pg-target-ankara
    mem_limit: 512m
    profiles: ["sync"]   # 3. ADIM: ankara sink hedefi, 'make sync-start' ile kalkar
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: targetdb
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d targetdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  debezium-ankara:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: debezium-ankara
    mem_limit: 1g
    profiles: ["sync"]   # 3. ADIM: ankara Connect, 'make sync-start' ile kalkar
    depends_on:
      kafka-ankara:
        condition: service_healthy
      pg-source-ankara:
        condition: service_healthy
      pg-target-ankara:
        condition: service_healthy
    ports:
      - "8085:8083"   # ankara Connect REST -> localhost:8085
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      BOOTSTRAP_SERVERS: kafka-ankara:19092
      GROUP_ID: dbz-connect-ankara
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ---------- Sürekli yük üreteci ----------
  # Aktif tarafın pg-source-gebze'una saniyede bir INSERT -> Debezium sürekli üretir, sink tüketir.
  # loadgen-gebze varsayılan (gebze aktif). failover'da loadgen-ankara devreye girer (profile).

  loadgen-gebze:
    image: postgres:16
    container_name: loadgen-gebze
    mem_limit: 128m
    depends_on:
      pg-source-gebze:
        condition: service_healthy
    environment:
      TARGET_HOST: pg-source-gebze
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "loadgen -> $$TARGET_HOST"
        while true; do
          PGPASSWORD=postgres psql -h "$$TARGET_HOST" -U postgres -d sourcedb \
            -c "INSERT INTO inventory.customers(name,email) VALUES ('load-'||floor(random()*1000000)::int, 'load@example.com');" >/dev/null 2>&1 \
            || echo "insert bekliyor ($$TARGET_HOST hazır değil?)"
          sleep 1
        done

  loadgen-ankara:
    image: postgres:16
    container_name: loadgen-ankara
    mem_limit: 128m
    profiles: ["failover"]
    depends_on:
      pg-source-ankara:
        condition: service_healthy
    environment:
      TARGET_HOST: pg-source-ankara
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "loadgen -> $$TARGET_HOST"
        while true; do
          PGPASSWORD=postgres psql -h "$$TARGET_HOST" -U postgres -d sourcedb \
            -c "INSERT INTO inventory.customers(name,email) VALUES ('load-'||floor(random()*1000000)::int, 'load@example.com');" >/dev/null 2>&1 \
            || echo "insert bekliyor ($$TARGET_HOST hazır değil?)"
          sleep 1
        done

  # ---------- Gözlem UI'ları (make up ile başlar — 1. adımdan sonra tarayıcıdan izle) ----------
  # Kafka UI  : http://localhost:8080  — gebze + ankara cluster'ları TEK arayüzde (topic/mesaj/Connect)
  # Adminer   : http://localhost:8090  — 4 Postgres'e de bağlanır (login'de sunucu seç)

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    mem_limit: 512m
    # Yalnız gebze'ye bağımlı: Adım 1'de ankara kalkmadan da UI açılır. Ankara cluster
    # aşağıda TANIMLI kalır -> Adım 1'de "offline" tile görünür, sync-start sonra online olur.
    depends_on:
      kafka-gebze:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      # Cluster 0 = gebze (aktif) + Debezium Connect'i
      KAFKA_CLUSTERS_0_NAME: gebze
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-gebze:19092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-gebze
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium-gebze:8083
      # Cluster 1 = ankara (DR) + Debezium Connect'i — sync sonrası gebze.* topic'leri burada belirir
      KAFKA_CLUSTERS_1_NAME: ankara
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: kafka-ankara:19092
      KAFKA_CLUSTERS_1_KAFKACONNECT_0_NAME: debezium-ankara
      KAFKA_CLUSTERS_1_KAFKACONNECT_0_ADDRESS: http://debezium-ankara:8083

  adminer:
    image: adminer:4
    container_name: adminer
    mem_limit: 128m
    depends_on:
      pg-source-gebze:
        condition: service_healthy
      pg-target-gebze:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      # Login: System=PostgreSQL · User=postgres · Pass=postgres
      #   pg-source-gebze/sourcedb (kaynak, inventory.customers)
      #   pg-target-gebze/targetdb (hedef, customers_replica)  ← CDC sonrası burayı yenile
      ADMINER_DEFAULT_SERVER: pg-target-gebze
      ADMINER_DESIGN: dracula
