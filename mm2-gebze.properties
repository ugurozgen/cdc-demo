# MirrorMaker 2 — mm2-gebze driver: YALNIZ ankara -> gebze yönü.
# "Remote consume, local produce": ankara'dan okur, gebze'ye (yakınına) yazar.
# Failback hazırlığı: ankara aktifken üretilen topic'ler + sink offset'i gebze'ye mirror'lanır.
# Bu dosya connect-mirror-maker.sh tarafından okunur.

clusters = gebze, ankara

gebze.bootstrap.servers = kafka-gebze:19092
ankara.bootstrap.servers = kafka-ankara:19092

# Yalnız geri yön (ileri yönü mm2-ankara driver'ı taşır)
ankara->gebze.enabled = true
gebze->ankara.enabled = false

# Hangi topic'ler mirror edilecek (internal/MM2 topic'leri hariç)
ankara->gebze.topics = .*
# connect_* = Kafka Connect worker internal topic'leri; iki Connect cluster'ında AYRI olmalı,
# ASLA mirror'lanmamalı (Identity'de ad çakışıp connector config'leri karışır — hayalet connector).
ankara->gebze.topics.exclude = .*[\\-\\.]internal, .*\\.replica, __.*, mm2.*, connect_.*, .*\\.checkpoints\\.internal, .*\\.heartbeats

# DR'ın kalbi: offset/checkpoint/heartbeat
ankara->gebze.emit.checkpoints.enabled = true
ankara->gebze.sync.group.offsets.enabled = true
ankara->gebze.emit.heartbeats.enabled = true

# KRİTİK: sink consumer group'u (connect-sink-customers) MM2 varsayılanında connect-.* ile
# dışlanır -> failback'te sink kaldığı yerden devam edemez. connect-.*'ı çıkarıp yalnız
# console-consumer, internal ve Connect worker koordinasyon grubunu (dbz-connect-*) hariç tutuyoruz.
ankara->gebze.groups = .*
ankara->gebze.groups.exclude = console-consumer-.*, __.*, dbz-connect-.*

ankara->gebze.sync.topic.configs.enabled = true
sync.topic.acls.enabled = false

# Lab tek broker -> her şey RF=1
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1
offset.storage.replication.factor = 1

# Lab'da hızlı görmek için aralıkları kısalt (prod'da artır)
refresh.topics.interval.seconds = 10
refresh.groups.interval.seconds = 10
sync.group.offsets.interval.seconds = 5
emit.checkpoints.interval.seconds = 5
emit.heartbeats.interval.seconds = 5

# DefaultReplicationPolicy (varsayılan) -> mirror topic ÖNEKLİ gelir: gebze'de "ankara.<topic>"
# (ankara.dbz.inventory.customers). Ayrı topic olduğu için failback'te gebze'nin yerel topic'ine
# eklenmez -> DUPLİKASYON OLMAZ, topic reset gerekmez. Sink hem yerel hem prefixed mirror'ı dinler.
